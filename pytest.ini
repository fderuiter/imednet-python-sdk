[pytest]
addopts = --junitxml=reports/junit.xml
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
testpaths =
    tests
markers =
    unit: marks unit tests
    live: marks tests as requiring a live external connection (deselect with '-m "not live"')
    browser: marks browser-level end-to-end tests
    fuzzing: marks fuzzing tests
    performance: marks performance tests
    a11y: marks accessibility audit tests
filterwarnings =
    ignore::ResourceWarning
    ignore:Exception ignored in
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestDeprecationWarning
