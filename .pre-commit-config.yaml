repos:
  - repo: local
    hooks:
      - id: hatch-lint
        name: Unified Linting
        entry: hatch run lint:all
        language: system
        types: [python]
        pass_filenames: true
      - id: check-root-sanitization
        name: Sanitize Repository Root Directory
        entry: python scripts/check_root_files.py
        language: system
        pass_filenames: false
        always_run: true
