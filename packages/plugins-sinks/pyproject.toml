[tool.poetry]
name = "imednet-plugins-sinks"
version = "0.1.0"
description = "Unified database sinks plugin for the iMednet Python SDK."
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "imednet_sinks", from = "src" }]
include = [{ path = "src/imednet_sinks/py.typed", format = ["sdist", "wheel"] }]

[tool.poetry.plugins."imednet.plugins"]
sinks = "imednet_sinks.plugin:create_sinks"

[tool.poetry.dependencies]
python = "^3.10"
imednet = { path = "../core", develop = true }
neo4j = { version = ">=5.0,<6.0", optional = true }
pymongo = { version = ">=4.0,<5.0", optional = true }
snowflake-connector-python = { version = ">=3.0,<4.0", optional = true }
pyarrow = { version = ">=14.0.1", optional = true }

[tool.poetry.extras]
neo4j = ["neo4j"]
mongodb = ["pymongo"]
snowflake = ["snowflake-connector-python", "pyarrow"]
all = ["neo4j", "pymongo", "snowflake-connector-python", "pyarrow"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
