[project]
name = "imednet-plugins-sinks"
version = "0.1.0"
description = "Unified database sinks plugin for the iMednet Python SDK."
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
    "imednet>=0.8.0"
]

[project.entry-points."imednet.plugins"]
sinks = "imednet_sinks.plugin:create_sinks"

[project.optional-dependencies]
neo4j = ["neo4j>=6.2.0,<7.0.0"]
mongodb = ["pymongo>=4.0,<5.0"]
snowflake = ["snowflake-connector-python>=3.0,<5.0", "pyarrow>=14.0.1", "urllib3>=2.7.0,<3.0.0", "cryptography>=46.0.7"]
all = ["neo4j>=6.2.0,<7.0.0", "pymongo>=4.0,<5.0", "snowflake-connector-python>=3.0,<5.0", "pyarrow>=14.0.1", "urllib3>=2.7.0,<3.0.0", "cryptography>=46.0.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_sinks"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/imednet_sinks"
]
