[project]
name = "apache-airflow-providers-imednet"
version = "0.6.0"
description = "Apache Airflow provider for iMednet"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "imednet",
    "apache-airflow>=2.7.0,<3.0.0",
]

[project.optional-dependencies]
amazon = ["apache-airflow-providers-amazon>=9.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/apache_airflow_providers_imednet"]

[tool.hatch.build.targets.sdist]
include = ["src/apache_airflow_providers_imednet"]

[tool.uv.sources]
imednet = { workspace = true }
