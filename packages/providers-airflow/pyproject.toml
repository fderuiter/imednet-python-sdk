[tool.poetry]
name = "apache-airflow-providers-imednet"
version = "0.5.1"
description = "Apache Airflow provider for iMednet"
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "apache_airflow_providers_imednet", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
imednet = { path = "../core", develop = true }
apache-airflow = ">=2.8.0"
apache-airflow-providers-amazon = ">=8.0.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
