[tool.poetry]
name = "apache-airflow-providers-imednet"
version = "0.6.0"
description = "Apache Airflow provider for iMednet"
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "apache_airflow_providers_imednet", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
imednet = ">=0.8.0, <1.0.0"
apache-airflow = ">=3.2.0,<4.0.0"
apache-airflow-providers-amazon = { version = ">=9.0.0", optional = true }

[tool.poetry.extras]
amazon = ["apache-airflow-providers-amazon"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
