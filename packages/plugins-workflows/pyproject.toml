[tool.poetry]
name = "imednet-workflows"
version = "0.6.0"
description = "Workflow plugin package for the iMednet Python SDK"
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "imednet_workflows", from = "src" }]
include = [{ path = "src/imednet_workflows/py.typed", format = ["sdist", "wheel"] }]

[tool.poetry.dependencies]
python = "^3.10"
imednet = { path = "../core", develop = true }
pandas = ">=2.2.3,<3.0.0"
typer = { extras = ["all"], version = "^0.15.2" }

[tool.poetry.plugins."imednet.plugins"]
workflows = "imednet_workflows.namespace:Workflows"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
