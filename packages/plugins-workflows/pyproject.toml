[project]
name = "imednet-workflows"
version = "0.5.1"
description = "Workflow plugin package for the iMednet Python SDK"
requires-python = ">=3.10,<4.0"
dependencies = [
  "imednet>=0.5.1",
]

[tool.poetry]
packages = [{ include = "imednet_workflows", from = "src" }]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
