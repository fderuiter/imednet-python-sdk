[tool.poetry]
name = "imednet-workflows"
version = "0.5.1"
description = "Workflow plugin package for the iMednet Python SDK"
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "imednet_workflows", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
imednet = ">=0.6.0,<1.0.0"
pandas = ">=2.2.3,<3.0.0"
typer = { extras = ["all"], version = "^0.15.2" }

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
