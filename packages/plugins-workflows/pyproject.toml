[project]
name = "imednet-workflows"
version = "0.6.0"
description = "Workflow plugin package for the iMednet Python SDK"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
    "imednet>=0.8.0,<1.0.0",
    "pandas>=2.2.3,<3.0.0",
    "filelock>=3.20.3,<4.0.0"
]

[project.entry-points."imednet.workflows"]
data_extraction = "imednet_workflows.data_extraction:DataExtractionWorkflow"
query_management = "imednet_workflows.query_management:QueryManagementWorkflow"
record_mapper = "imednet_workflows.record_mapper:RecordMapper"
record_update = "imednet_workflows.record_update:RecordUpdateWorkflow"
subject_data = "imednet_workflows.subject_data:SubjectDataWorkflow"
uat_inspector = "imednet_workflows.uat:StudySchemaInspector"
uat = "imednet_workflows.uat:UATWorkflow"

[project.entry-points."imednet.cli_plugins"]
workflows = "imednet_workflows.cli:setup_parser"
subject_data = "imednet_workflows.cli:setup_subject_parser"

[project.entry-points."imednet.pollers"]
JobPoller = "imednet_workflows:JobPoller"
AsyncJobPoller = "imednet_workflows:AsyncJobPoller"

[project.entry-points."imednet.mappers"]
RecordMapper = "imednet_workflows.record_mapper:RecordMapper"

[project.entry-points."imednet.loaders"]
CachedRecordsLoader = "imednet_workflows.cached_loader:CachedRecordsLoader"

[project.entry-points."imednet.stores"]
ConfigVersionStore = "imednet_workflows.config_version_control:ConfigVersionStore"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_workflows"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/imednet_workflows"
]
