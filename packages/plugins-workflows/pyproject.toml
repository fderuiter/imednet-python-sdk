[project]
name = "imednet-workflows"
version = "0.6.0"
description = "Workflow plugin package for the iMednet Python SDK"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
    "imednet>=0.8.0,<1.0.0",
    "pandas>=2.2.3,<3.0.0",
    "typer[all]>=0.15.2,<0.16.0",
    "filelock>=3.20.3,<4.0.0"
]

[project.optional-dependencies]
uat = []

[project.entry-points."imednet.plugins"]
workflows = "imednet_workflows.namespace:Workflows"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_workflows"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/imednet_workflows"
]
