[tool.poetry]
name = "imednet"
version = "0.7.0"
description = "Unofficial Python SDK for the iMednet clinical trials API"
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
readme = "README.md"
license = "MIT"
keywords = ["imednet", "clinical trials", "sdk", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
maintainers = ["Frederick de Ruiter <fpderuiter@gmail.com>"]
packages = [{ include = "imednet", from = "src" }]
include = [{ path = "src/imednet/py.typed", format = ["sdist", "wheel"] }]
repository = "https://github.com/fderuiter/imednet-python-sdk"
homepage = "https://github.com/fderuiter/imednet-python-sdk"

[tool.poetry.scripts]
imednet = "imednet.cli:app"

[tool.poetry.dependencies]
python = "^3.10"
h11 = "0.16.0"
pydantic = "^2.11.3"
httpx = "^0.28.1"
tenacity = "^9.1.2"
python-dotenv = ">=1.2.2"
typer = { extras = ["all"], version = "^0.15.2", optional = true }
python-json-logger = "^2.0.7"
urllib3 = "^2.7.0"
filelock = "^3.20.3"
pygments = "^2.19.2"
cryptography = ">=46.0.7"
pandas = { version = ">=2.2.3,<3.0.0", optional = true }
sqlalchemy = { version = "^2.0", optional = true }
openpyxl = { version = "^3.1", optional = true }
pyarrow = { version = ">=14.0.0", optional = true }
duckdb = { version = ">=1.0.0", optional = true }

[tool.poetry.extras]
# Install via: pip install 'imednet[cli]'
# typer[all] transitively includes rich and other CLI rendering dependencies.
cli = ["typer"]
# Install via: pip install 'imednet[duckdb]'
duckdb = ["duckdb"]
# Install via: pip install 'imednet[export]'
# Includes all export dependencies (CSV, Excel, Parquet, SQL, DuckDB)
export = ["pandas", "sqlalchemy", "pyarrow", "openpyxl", "duckdb"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
