[project]
name = "imednet"
version = "0.8.0"
description = "Unofficial Python SDK for the iMednet clinical trials API"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
readme = "README.md"
license = "MIT"
keywords = ["imednet", "clinical trials", "sdk", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
maintainers = [
    { name = "Frederick de Ruiter", email = "fpderuiter@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "h11==0.16.0",
    "pydantic>=2.11.3,<3.0.0",
    "httpx>=0.28.1,<0.29.0",
    "tenacity>=9.1.2,<10.0.0"
]

[project.urls]
repository = "https://github.com/fderuiter/imednet-python-sdk"
homepage = "https://github.com/fderuiter/imednet-python-sdk"

[project.scripts]
imednet = "imednet.cli:app"

[project.optional-dependencies]
cli = [
    "python-dotenv>=1.2.2",
    "python-json-logger>=2.0.7,<3.0.0",
    "pygments>=2.19.2,<3.0.0"
]
duckdb = ["duckdb>=1.1.0"]
export = [
    "pandas>=2.2.3,<3.0.0",
    "sqlalchemy>=2.0,<3.0",
    "pyarrow>=14.0.1",
    "openpyxl>=3.1,<4.0",
    "duckdb>=1.1.0",
    "imednet-workflows"
]
mongodb = ["imednet-plugins-sinks", "pymongo>=4.0,<5.0"]
neo4j = ["imednet-plugins-sinks", "neo4j>=6.2.0,<7.0.0"]
snowflake = ["imednet-plugins-sinks", "snowflake-connector-python>=3.0,<5.0", "pyarrow>=14.0.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/imednet"
]
