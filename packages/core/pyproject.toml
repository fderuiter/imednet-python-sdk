[project]
name = "imednet"
version = "0.8.0"
description = "Unofficial Python SDK for the iMednet clinical trials API"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
readme = "README.md"
license = { text = "MIT" }
keywords = ["imednet", "clinical trials", "sdk", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
maintainers = [
    { name = "Frederick de Ruiter", email = "fpderuiter@gmail.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "h11==0.16.0",
    "pydantic>=2.11.3",
    "httpx>=0.28.1",
    "tenacity>=9.1.2",
    "python-dotenv>=1.2.2",
    "python-json-logger>=2.0.7",
    "urllib3>=2.7.0",
    "filelock>=3.20.3",
    "pygments>=2.19.2",
    "cryptography>=41.0.0",
]

[project.urls]
repository = "https://github.com/fderuiter/imednet-python-sdk"
homepage = "https://github.com/fderuiter/imednet-python-sdk"

[project.scripts]
imednet = "imednet.cli:app"

[project.optional-dependencies]
cli = ["typer[all]>=0.15.2,<0.16.0"]
duckdb = ["duckdb>=1.1.0"]
export = ["pandas>=2.0.0,<2.2.0", "sqlalchemy>=1.4", "pyarrow>=14.0.1", "openpyxl>=3.1,<4.0", "duckdb>=1.1.0"]
neo4j = ["neo4j>=5.0,<6.0"]
mongodb = ["pymongo>=4.0,<5.0"]
snowflake = ["snowflake-connector-python>=3.0,<4.0", "pyarrow>=14.0.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet"]

[tool.hatch.build.targets.sdist]
include = ["src/imednet"]
