[project]
name = "imednet-streamlit"
version = "0.2.0"
description = "Interactive Streamlit reporting dashboards for iMednet EDC."
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "imednet",
    "imednet-workflows",
    "streamlit>=1.30.0",
    "altair>=5.0.0",
    "pandas>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_streamlit"]

[tool.hatch.build.targets.sdist]
include = ["src/imednet_streamlit"]

[tool.uv.sources]
imednet = { workspace = true }
"imednet-workflows" = { workspace = true }
