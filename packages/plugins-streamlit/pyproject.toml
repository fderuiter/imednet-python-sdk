[project]
name = "imednet-streamlit"
version = "0.2.0"
description = "Interactive Streamlit reporting dashboards for iMednet EDC."
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
    "imednet>=0.8.0",
    "imednet-workflows>=0.6.0",
    "streamlit>=1.30.0",
    "altair>=5.0.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0"
]

[project.entry-points."imednet.cli_plugins"]
dashboard = "imednet_streamlit.cli:setup_parser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_streamlit"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/imednet_streamlit"
]
