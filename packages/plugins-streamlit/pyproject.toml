[tool.poetry]
name = "imednet-streamlit"
version = "0.2.0"
description = "Interactive Streamlit reporting dashboards for iMednet EDC."
authors = ["Frederick de Ruiter <127706008+fderuiter@users.noreply.github.com>"]
packages = [{ include = "imednet_streamlit", from = "src" }]
include = [{ path = "src/imednet_streamlit/py.typed", format = ["sdist", "wheel"] }]

[tool.poetry.dependencies]
python = "^3.10"
imednet = { path = "../core", develop = true }
imednet-workflows = { path = "../plugins-workflows", develop = true }
streamlit = ">=1.30.0"
altair = ">=5.0.0"
pandas = ">=2.0.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
