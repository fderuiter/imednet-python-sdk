[project]
name = "imednet-workspace"
version = "0.1.0"
description = "Monorepo workspace for imednet packages"
authors = [
    { name = "Frederick de Ruiter", email = "127706008+fderuiter@users.noreply.github.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "imednet",
    "imednet-workflows",
    "imednet-streamlit",
    "apache-airflow-providers-imednet"
]

[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pandas>=2.0.0,<2.2.0",
    "duckdb>=1.1.0",
    "pyarrow>=14.0.1",
    "ruff>=0.11.6",
    "mypy>=1.15.0,<1.16.0",
    "pytest>=9.0.3",
    "pytest-cov>=6.1.1",
    "respx>=0.22.0",
    "pytest-asyncio>=0.24.0",
    "faker>=24.9",
    "pre-commit>=4.2.0",
    "virtualenv>=20.36.1",
    "werkzeug>=3.1.6",
    "sphinx>=6.2.0",
    "sphinx-autodoc-typehints",
    "sphinx-rtd-theme>=3.0.2",
    "boto3>=1.34",
    "moto>=5.0",
    "sqlalchemy>=1.4",
    "openpyxl>=3.1",
    "sphinxcontrib-mermaid>=0.9.2",
    "doc8>=2.0.0",
    "codespell>=2.4.1",
    "pip>=26.0",
    "apache-airflow-providers-amazon>=9.0.0",
    "neo4j>=5.0,<6.0",
    "pymongo>=4.0,<5.0",
    "snowflake-connector-python>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
src = ["packages/core/src", "packages/plugins-workflows/src", "packages/providers-airflow/src", "packages/plugins-streamlit/src", "tests"]

[tool.ruff.lint.isort]
known-first-party = ["imednet", "imednet_workflows", "apache_airflow_providers_imednet", "imednet_streamlit"]

[tool.ruff.lint]
select = ["E", "F", "I", "N"]
ignore = ["D", "ANN", "S101"]

[tool.ruff.lint.pep8-naming]
classmethod-decorators = ["field_validator", "model_validator"]

[tool.doc8]
max_line_length = 400
ignore_path = ["docs/_build"]

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = false
plugins = []
exclude = '^examples/.*$'

[[tool.mypy.overrides]]
module = [
    "pandas",
    "pythonjsonlogger.*",
    "opentelemetry",
    "opentelemetry.*",
    "airflow",
    "airflow.*",
    "typer",
    "typer.*",
    "rich",
    "rich.*",
    "faker",
    "faker.*",
    "sqlalchemy",
    "sqlalchemy.*",
    "dotenv",
    "dotenv.*",
    "boto3",
    "boto3.*",
    "botocore",
    "botocore.*",
    "moto",
    "moto.*",
    "openpyxl",
    "openpyxl.*",
    "duckdb",
    "duckdb.*",
    "streamlit",
    "streamlit.*",
    "altair",
    "altair.*",
]
ignore_missing_imports = true

[tool.uv.sources]
imednet = { workspace = true }
"imednet-workflows" = { workspace = true }
"imednet-streamlit" = { workspace = true }
"apache-airflow-providers-imednet" = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/imednet_workspace"]
