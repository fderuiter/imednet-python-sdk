permissions:
  contents: read
  issues: write
name: Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8am

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Smoke Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pkg_args=""
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              pkg_args="$pkg_args -e $package"
            fi
          done
          if [ -n "$pkg_args" ]; then
            python -m pip install $pkg_args
          fi
          python -m pip install -e ".[dev,docs]" 
      - name: Install Newman
        run: npm install -g newman
      - name: Run Postman tests
        env:
          API_KEY: ${{ secrets.APIKEY }}
          SECURITY_KEY: ${{ secrets.SECURITYKEY }}
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          newman run imednet.postman_collection.json \
            --env-var "api_key=$API_KEY" \
            --env-var "security_key=$SECURITY_KEY" \
            --env-var "base_url=$BASE_URL" > postman.log 2>&1
      - name: Post smoke record
        id: smoke_record
        env:
          IMEDNET_API_KEY: ${{ secrets.APIKEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.SECURITYKEY }}
          IMEDNET_BASE_URL: ${{ vars.BASE_URL }}
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          set +e
          python scripts/post_smoke_record.py --verbose 2>&1 | tee smoke.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e
      - name: Evaluate smoke result
        run: |
          status="${{ steps.smoke_record.outputs.exit_code }}"
          case "$status" in
            0)
              echo "::notice:: Smoke status: passed"
              ;;
            2)
              echo "::notice:: Smoke status: skipped (missing live identifiers)"
              ;;
            *)
              echo "::error:: Smoke status: failed"
              exit 1
              ;;
          esac
      - name: Run live tests
        env:
          IMEDNET_API_KEY: ${{ secrets.APIKEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.SECURITYKEY }}
          IMEDNET_BASE_URL: ${{ vars.BASE_URL }}
          IMEDNET_RUN_E2E: "1"
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          pytest -vv -s --log-cli-level=INFO tests/live 2>&1 | tee live_tests.log
      - name: Analyze API Drift
        if: always()
        run: |
          # Count drift logs
          touch smoke.log live_tests.log
          drift_count=$(grep -c "Drift detected" smoke.log live_tests.log | awk -F: '{sum+=$2} END {print sum}')
          echo "Found $drift_count drift logs."
          
          if [ "$drift_count" -gt 0 ]; then
            echo "::warning:: Significant API drift detected ($drift_count instances). Upstream contract has changed."
            # We can choose to fail the build if drift logs exceed a threshold
            if [ "$drift_count" -gt 20 ]; then
              echo "::error:: Drift threshold exceeded. Triggering alert."
              exit 1
            fi
          fi
      - name: Alert on Failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Scheduled Smoke Test Failed',
              body: 'The scheduled smoke test job has failed. Please investigate the upstream API drift.'
            });
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            smoke.log
            live_tests.log
            postman.log
