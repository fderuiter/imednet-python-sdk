permissions:
  contents: read
name: Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8am

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv sync
      - name: Post smoke record
        id: smoke_record
        env:
          IMEDNET_API_KEY: ${{ secrets.APIKEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.SECURITYKEY }}
          IMEDNET_BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set +e
          uv run python scripts/post_smoke_record.py --verbose 2>&1 | tee smoke.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e
      - name: Evaluate smoke result
        run: |
          status="${{ steps.smoke_record.outputs.exit_code }}"
          case "$status" in
            0)
              echo "::notice:: Smoke status: passed"
              exit 0
              ;;
            2)
              echo "::notice:: Smoke status: skipped (missing live identifiers)"
              exit 0
              ;;
            *)
              echo "::error:: Smoke status: failed"
              ;;
          esac
          exit 1
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: smoke.log
      - name: Run live tests
        env:
          IMEDNET_API_KEY: ${{ secrets.APIKEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.SECURITYKEY }}
          IMEDNET_BASE_URL: ${{ vars.BASE_URL }}
          IMEDNET_RUN_E2E: "1"
        run: |
          uv run pytest -vv -s --log-cli-level=INFO tests/live
