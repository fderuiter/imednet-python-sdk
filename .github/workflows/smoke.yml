permissions:
  contents: read
  issues: write
name: Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Smoke Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          packages=()
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              packages+=("-e" "$package")
            fi
          done
          packages+=("-e" ".[dev,docs]")
          python -m pip install "${packages[@]}" 
      - name: Install Newman
        run: npm install -g newman
      - name: Run Postman tests
        env:
          API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
        run: |
          newman run imednet.postman_collection.json \
            --env-var "api_key=$API_KEY" \
            --env-var "security_key=$SECURITY_KEY" \
            --env-var "base_url=$BASE_URL" > postman.log 2>&1
      - name: Post smoke record
        id: smoke_record
        env:
          IMEDNET_API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          IMEDNET_BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          set +e
          python scripts/post_smoke_record.py --verbose 2>&1 | tee smoke.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e
      - name: Evaluate smoke result
        run: |
          status="${{ steps.smoke_record.outputs.exit_code }}"
          case "$status" in
            0)
              echo "::notice:: Smoke status: passed"
              ;;
            2)
              echo "::notice:: Smoke status: skipped (missing live identifiers)"
              ;;
            *)
              echo "::error:: Smoke status: failed"
              exit 1
              ;;
          esac
      - name: Run live tests
        env:
          IMEDNET_API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          IMEDNET_BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
          IMEDNET_RUN_E2E: "1"
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          pytest -vv -s --log-cli-level=INFO tests/live 2>&1 | tee live_tests.log
      - name: Analyze API Drift
        id: analyze_drift
        if: always()
        run: |
          python scripts/aggregate_verification.py
      - name: Check Drift
        if: always()
        run: |
          if [ "${{ steps.analyze_drift.outputs.drift_detected }}" == "true" ]; then
            echo "Found violations."
            if [ "${{ steps.analyze_drift.outputs.drift_count }}" -gt 20 ]; then
              echo "::error:: Drift threshold exceeded. Triggering alert."
              exit 1
            fi
          fi
      - name: Alert on Failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Scheduled Smoke Test Failed',
              body: 'The scheduled smoke test job has failed. Please investigate the upstream API drift.'
            });
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3
        with:
          name: validation-logs
          path: |
            smoke.log
            live_tests.log
            postman.log
