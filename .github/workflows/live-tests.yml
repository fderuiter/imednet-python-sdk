name: Live Integration Tests

on:
  workflow_dispatch:
    inputs:
      approved:
        description: "Approve running live integration tests"
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  live-validation:
    name: Live Integration Tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.approved }}
    runs-on: ubuntu-latest
    environment: live-testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pkg_args=""
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              pkg_args="$pkg_args -e $package"
            fi
          done
          if [ -n "$pkg_args" ]; then
            python -m pip install $pkg_args
          fi
          python -m pip install -e ".[dev,docs]" 

      - name: Run Smoke Tests
        env:
          IMEDNET_API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          IMEDNET_BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          python scripts/post_smoke_record.py

      - name: Execute Live Test Suite & Detect Drift
        id: live_tests
        continue-on-error: true
        env:
          IMEDNET_API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          IMEDNET_BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
          IMEDNET_RUN_E2E: "1"
          IMEDNET_ALLOW_MUTATION: ${{ vars.IMEDNET_ALLOW_MUTATION }}
          IMEDNET_STRICT_MODE: "1"
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          set +e
          pytest tests/live/ -v --log-cli-level=WARNING > pytest_output.txt 2>&1
          EXIT_CODE=$?
          set -e
          
          echo "pytest_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          grep -i -E "(ValidationError|Structural shift detected|extra fields not permitted)" pytest_output.txt > drift_report.txt || true
          
          if [ -s drift_report.txt ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Post Drift Report
        if: steps.live_tests.outputs.drift_detected == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift_report.txt', 'utf8');
            const body = `### ⚠️ API Drift Detected\n\nThe live integration tests detected schema drift or structural poly-type shifts:\n\n\`\`\`\n${report.substring(0, 60000)}\n\`\`\``;
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('Failed to post drift report comment:', error.message);
            }

      - name: Fail if tests failed
        if: steps.live_tests.outputs.pytest_exit_code != '0'
        run: |
          cat pytest_output.txt
          exit ${{ steps.live_tests.outputs.pytest_exit_code }}
