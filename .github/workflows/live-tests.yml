name: Live Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 1 * *"

permissions:
  contents: read

jobs:
  live-validation:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    environment: live-testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Execute Live Test Suite
        env:
          IMEDNET_API_KEY: ${{ secrets.IMEDNET_API_KEY }}
          IMEDNET_SECURITY_KEY: ${{ secrets.IMEDNET_SECURITY_KEY }}
          IMEDNET_BASE_URL: ${{ vars.IMEDNET_BASE_URL }}
          IMEDNET_RUN_E2E: "1"
          IMEDNET_ALLOW_MUTATION: ${{ vars.IMEDNET_ALLOW_MUTATION }}
        run: |
          uv run pytest tests/live/ -v
