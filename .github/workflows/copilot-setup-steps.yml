name: "Copilot Setup Steps"

# Controls when the workflow will run
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # CRITICAL: This exact job key name is required by GitHub Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Cache Workspace Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-venv-${{ runner.os }}-"3.10"-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-"3.10"-

      # Caching dependencies speeds up Copilot engine initialization significantly
      - name: Load cached venv
        id: cached-dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Workspace Dependencies
        run: |
          python -m pip install --upgrade pip
          packages=()
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              packages+=("-e" "$package")
            fi
          done
          packages+=("-e" ".[dev,docs]")
          python -m pip install "${packages[@]}" 
