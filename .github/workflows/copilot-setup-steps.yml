name: "Copilot Setup Steps"

# Controls when the workflow will run
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # CRITICAL: This exact job key name is required by GitHub Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Caching dependencies speeds up Copilot engine initialization significantly
      - name: Load cached venv
        id: cached-dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Workspace Dependencies
        run: |
          python -m pip install --upgrade pip
          pkg_args=""
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              pkg_args="$pkg_args -e $package"
            fi
          done
          if [ -n "$pkg_args" ]; then
            python -m pip install $pkg_args
          fi
          python -m pip install -e ".[dev,docs]" 
