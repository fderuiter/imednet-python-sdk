name: Pipeline

on:
  push:
    branches: [main]
    tags:
      - "imednet-v*.*.*"
      - "imednet-workflows-v*.*.*"
      - "apache-airflow-providers-imednet-v*.*.*"
      - "imednet-streamlit-v*.*.*"
      - "imednet-plugins-sinks-v*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # JOB 0: PR TITLE LINT (Pull requests only)
  # ------------------------------------------------------------------
  semantic-pr-title:
    name: Semantic PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        if: ${{ !contains(github.event.pull_request.user.login, '[bot]') }}
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            test
            refactor
            perf
            revert

  # ------------------------------------------------------------------
  # JOB 1: QUALITY GATE (Runs per package)
  # ------------------------------------------------------------------
  # ------------------------------------------------------------------
  # JOB 0.5: DETECT CHANGES & PLAN
  # ------------------------------------------------------------------
  plan:
    name: Plan CI Execution
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_integration: ${{ steps.filter.outputs.export_logic }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            export_logic:
              - 'packages/**/integrations/**'
              - 'packages/**/tests/integration/**'
              - 'docker-compose.yml'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          separator: ","

      - name: Determine Impacted Packages
        id: set-matrix
        run: |
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            MATRIX=$(echo "" | python3 scripts/ci_plan.py)
          else
            MATRIX=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ',' '\n' | python3 scripts/ci_plan.py)
          fi
          echo "Impacted packages: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  quality:
    name: Quality & Security - ${{ matrix.package }}
    needs: plan
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run Quality & Security Checks
        run: hatch run lint:all packages/${{ matrix.package }}

  # ------------------------------------------------------------------
  # JOB 2: BUILD ARTIFACT (Builds the library)
  # ------------------------------------------------------------------
  build:
    name: Build Distribution
    needs: [plan, quality]
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Build Workspace Packages
        run: |
          IMPACTED=$(echo '${{ needs.plan.outputs.matrix }}' | jq -r '.[]')
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              PKG_NAME=$(basename "$package")
              if echo "$IMPACTED" | grep -qx "$PKG_NAME"; then
                (
                  cd "$package"
                  python3 -m pip install build && python3 -m build
                )
              else
                echo "Skipping $PKG_NAME as it is not impacted by this change plan."
              fi
            fi
          done

      - name: Upload Core Artifact
        if: contains(fromJSON(needs.plan.outputs.matrix), 'core')
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: packages/core/dist/
          retention-days: 1

      - name: Upload Workflows Artifact
        if: contains(fromJSON(needs.plan.outputs.matrix), 'plugins-workflows')
        uses: actions/upload-artifact@v4
        with:
          name: dist-workflows
          path: packages/plugins-workflows/dist/
          retention-days: 1

      - name: Upload Providers Artifact
        if: contains(fromJSON(needs.plan.outputs.matrix), 'providers-airflow')
        uses: actions/upload-artifact@v4
        with:
          name: dist-providers
          path: packages/providers-airflow/dist/
          retention-days: 1

      - name: Upload Sinks Artifact
        if: contains(fromJSON(needs.plan.outputs.matrix), 'plugins-sinks')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-sinks
          path: packages/plugins-sinks/dist/
          retention-days: 1

      - name: Upload Streamlit Artifact
        if: contains(fromJSON(needs.plan.outputs.matrix), 'plugins-streamlit')
        uses: actions/upload-artifact@v4
        with:
          name: dist-streamlit
          path: packages/plugins-streamlit/dist/
          retention-days: 1

  # ------------------------------------------------------------------
  # JOB 3: TEST MATRIX (Tests impacted packages)
  # ------------------------------------------------------------------
  test:
    name: Test ${{ matrix.package }} (Python ${{ matrix.python-version }})
    needs: [plan, build]
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.plan.outputs.matrix) }}
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      
      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          
          if ls dist/*.whl 1> /dev/null 2>&1; then
            .venv/bin/python -m pip install --force-reinstall --no-deps dist/*.whl
          fi
          
      - name: Run Tests
        env:
          IMEDNET_API_KEY: dummy
          IMEDNET_SECURITY_KEY: dummy
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          if [ "${{ matrix.package }}" = "core" ]; then
            TEST_ARGS="--ignore-glob=*airflow* --ignore-glob=*workflows* --ignore-glob=*streamlit* --ignore-glob=*sinks* --ignore-glob=*browser* tests/"
            COV_ARGS="--cov=imednet"
          elif [ "${{ matrix.package }}" = "plugins-workflows" ]; then


            TEST_ARGS="tests/unit/test_workflows*.py tests/unit/workflows/ tests/workflows/ tests/unit/test_chunked_pipeline.py tests/unit/cli/ tests/unit/test_config_version_control.py tests/unit/test_duckdb_ingestion_workflow.py tests/unit/test_job_poller.py tests/unit/test_record_mapper.py tests/unit/test_record_mapper_hierarchy.py tests/unit/test_state_ledger.py tests/unit/test_study_structure.py tests/unit/test_sync_worker.py tests/unit/test_cached_records_loader.py"
            COV_ARGS="--cov=imednet_workflows"
          elif [ "${{ matrix.package }}" = "providers-airflow" ]; then
            TEST_ARGS="tests/unit/test_airflow*.py"
            COV_ARGS="--cov=apache_airflow_providers_imednet"
          elif [ "${{ matrix.package }}" = "plugins-streamlit" ]; then
            TEST_ARGS="tests/unit/test_streamlit*.py tests/unit/streamlit/ tests/unit/streamlit_plugin/"
            COV_ARGS="--cov=imednet_streamlit"
          elif [ "${{ matrix.package }}" = "plugins-sinks" ]; then
            TEST_ARGS="packages/plugins-sinks/tests/"
            COV_ARGS="--cov=imednet_sinks"
          fi
          
          pytest -q $COV_ARGS --cov-report=xml --cov-fail-under=90 -m "not live and not browser" --ignore=tests/live/ --ignore=tests/browser/ $TEST_ARGS || {
            RET=$?
            if [ $RET -eq 5 ]; then
              echo "No tests collected for ${{ matrix.package }}. Passing gracefully."
              exit 0
            else
              exit $RET
            fi
          }

  # ------------------------------------------------------------------
  # JOB 3.5: INTEGRATION SANDBOX (Hermetic testing for localizable sinks)
  # ------------------------------------------------------------------
  integration-sandbox:
    name: Hermetic Integration Sandbox
    needs: [plan, build]
    if: needs.plan.outputs.run_integration == 'true' && needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"

      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Run Hermetic Integration Sandbox
        env:
          IMEDNET_API_KEY: dummy
          IMEDNET_SECURITY_KEY: dummy
        run: make test-containers

  # ------------------------------------------------------------------
  # JOB 3.6: SECURITY ROBUSTNESS (Fuzzing)
  # ------------------------------------------------------------------
  fuzzing:
    name: Robustness Fuzzing
    needs: build
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
        
      - name: Run Coverage-Guided Fuzzing (1,000,000 iterations)
        run: ./scripts/fuzz_test.sh

  # ------------------------------------------------------------------
  # JOB 3.7: VALIDATE EXTRAS
  # ------------------------------------------------------------------
  validate-extras:
    name: Validate Documented Extras
    needs: build
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extra: ["export", "duckdb", "mongodb", "neo4j", "snowflake", "cli"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      
      - name: Build Packages
        run: |
          python3 -m pip install build
          python3 -m build packages/plugins-workflows
          python3 -m build packages/plugins-sinks
          python3 -m build packages/core

      - name: Install Core with Extra
        run: |
          WHEEL=$(ls packages/core/dist/imednet-*.whl)
          SINKS_WHEEL=$(ls packages/plugins-sinks/dist/imednet_plugins_sinks-*.whl)
          WORKFLOWS_WHEEL=$(ls packages/plugins-workflows/dist/imednet_workflows-*.whl)
          python3 -m pip install "$WHEEL" "$SINKS_WHEEL" "$WORKFLOWS_WHEEL"
          python3 -m pip install "${WHEEL}[${{ matrix.extra }}]"

      - name: Verify CLI Availability
        run: |
          imednet --help || true

  # ------------------------------------------------------------------
  # JOB 3.8: VALIDATE PACKAGE CONSUMPTION
  # ------------------------------------------------------------------
  validate-package-consumption:
    name: Validate Package Consumption
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"

      - name: Install build tool
        run: python -m pip install build

      - name: Validate Package Consumption
        run: python scripts/validate_package_consumption.py

  # ------------------------------------------------------------------
  # JOB 4: DOCS (Build & Prepare for Deploy)
  # ------------------------------------------------------------------
  docs:
    name: Build Documentation
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"

      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Run Doctests
        run: make doctest

      - name: Build HTML
        run: make docs

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # ------------------------------------------------------------------
  # JOB 5: DEPLOY DOCS (Only on main push)
  # ------------------------------------------------------------------
  deploy-docs:
    name: Deploy to GH Pages
    needs: [plan, test, docs]
    # Only deploy docs if tests pass (or are skipped) and we are on main
    if: always() && !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ------------------------------------------------------------------
  # JOB 6: PUBLISH TO PYPI
  # release-please manifest mode creates tags of the form
  #   <package-name>-v<version>, e.g. imednet-v0.7.0
  # Publish jobs run on package-specific tags and on release commits to main
  # (`chore: release main`) so publication does not depend on tag push events.
  # `skip-existing` keeps reruns idempotent.
  # ------------------------------------------------------------------
  publish-core:
    name: Publish imednet to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-workflows:
    name: Publish imednet-workflows to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-workflows-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Workflows Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-workflows
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-providers:
    name: Publish apache-airflow-providers-imednet to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/apache-airflow-providers-imednet-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Providers Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-providers
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-sinks:
    name: Publish imednet-plugins-sinks to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-plugins-sinks-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Sinks Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-sinks
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  publish-streamlit:
    name: Publish imednet-streamlit to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-streamlit-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Streamlit Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-streamlit
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ------------------------------------------------------------------
  # JOB X: ACCESSIBILITY AUDIT
  # ------------------------------------------------------------------
  accessibility-audit:
    name: WCAG 2.1 Accessibility Audit
    needs: plan
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv sync --locked --all-extras
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          .venv/bin/python -m pip install axe-playwright-python playwright
          .venv/bin/python -m playwright install --with-deps chromium
      - name: Run automated accessibility scan
        run: |
          python scripts/a11y_audit.py
          
      - name: Auto-update VPAT
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/VPAT.md packages/plugins-streamlit/src/imednet_streamlit/pages/a11y_report.json
          git commit -m "docs: auto-update VPAT and conformance report from latest accessibility audit" || echo "No changes to commit"
          git push
