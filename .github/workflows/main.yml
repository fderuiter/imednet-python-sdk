name: Pipeline

on:
  push:
    branches: [main]
    tags:
      - "imednet-v*.*.*"
      - "imednet-workflows-v*.*.*"
      - "apache-airflow-providers-imednet-v*.*.*"
      - "imednet-streamlit-v*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # JOB 0: PR TITLE LINT (Pull requests only)
  # ------------------------------------------------------------------
  semantic-pr-title:
    name: Semantic PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            test
            refactor
            perf
            revert

  # ------------------------------------------------------------------
  # JOB 1: QUALITY GATE (Runs once)
  # ------------------------------------------------------------------
  quality:
    name: Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Enforce Style
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Type Check (MyPy)
        run: |
          uv run mypy packages/core/src/imednet
          uv run mypy packages/plugins-workflows/src/imednet_workflows
          uv run mypy packages/providers-airflow/src/apache_airflow_providers_imednet
          uv run mypy packages/plugins-streamlit/src/imednet_streamlit
          uv run mypy --strict packages/core/src/imednet/models packages/core/src/imednet/errors

      - name: Security Audit
        run: |
          uv run pip install pip-audit
          for i in 1 2 3; do
            uv run pip-audit -s osv --timeout 60 && exit 0
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done
          echo "Audit failed after 3 attempts."
          exit 1

  # ------------------------------------------------------------------
  # JOB 2: BUILD ARTIFACT (Builds the library)
  # ------------------------------------------------------------------
  build:
    name: Build Distribution
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Build Workspace Packages
        run: |
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              (
                cd "$package"
                uv build
              )
            fi
          done

      - name: Upload Core Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: packages/core/dist/
          retention-days: 1

      - name: Upload Workflows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-workflows
          path: packages/plugins-workflows/dist/
          retention-days: 1

      - name: Upload Providers Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-providers
          path: packages/providers-airflow/dist/
          retention-days: 1

      - name: Upload Streamlit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-streamlit
          path: packages/plugins-streamlit/dist/
          retention-days: 1

  # ------------------------------------------------------------------
  # JOB 3: TEST MATRIX (Tests the BUILT library)
  # ------------------------------------------------------------------
  test:
    name: Test Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Run Tests
        env:
          IMEDNET_API_KEY: dummy
          IMEDNET_SECURITY_KEY: dummy
        run: |
          uv run pytest -q \
            --cov=imednet \
            --cov=imednet_workflows \
            --cov=apache_airflow_providers_imednet \
            --cov=imednet_streamlit \
            --cov-report=xml \
            --cov-fail-under=90 \
            -m "not live" \
            --ignore=tests/live/

  # ------------------------------------------------------------------
  # JOB 4: DOCS (Build & Prepare for Deploy)
  # ------------------------------------------------------------------
  docs:
    name: Build Documentation
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5

      - run: uv sync

      - name: Build HTML
        run: make docs

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # ------------------------------------------------------------------
  # JOB 5: DEPLOY DOCS (Only on main push)
  # ------------------------------------------------------------------
  deploy-docs:
    name: Deploy to GH Pages
    needs: [test, docs]
    # Only deploy docs if tests pass and we are on main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ------------------------------------------------------------------
  # JOB 6: PUBLISH TO PYPI
  # release-please manifest mode creates tags of the form
  #   <package-name>-v<version>, e.g. imednet-v0.7.0
  # Publish jobs run on package-specific tags and on release commits to main
  # (`chore: release main`) so publication does not depend on tag push events.
  # `skip-existing` keeps reruns idempotent.
  # ------------------------------------------------------------------
  publish-core:
    name: Publish imednet to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-workflows:
    name: Publish imednet-workflows to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-workflows-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Workflows Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-workflows
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-providers:
    name: Publish apache-airflow-providers-imednet to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/apache-airflow-providers-imednet-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Providers Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-providers
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-streamlit:
    name: Publish imednet-streamlit to PyPI
    needs: test
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/imednet-streamlit-v') ||
        (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: release main'))
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - name: Download Streamlit Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-streamlit
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
