name: Automated Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Use GITHUB_TOKEN for release-please operations.
          # PyPI deployment is handled in main.yml on release commits to main,
          # so publishing does not depend on tag-triggered workflow runs.
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-release: true
