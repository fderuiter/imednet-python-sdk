name: Automated Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # A PAT is required here instead of GITHUB_TOKEN.
          # GitHub blocks new workflow runs for events (tag pushes, releases)
          # created by GITHUB_TOKEN, so the publish jobs in main.yml would
          # always be skipped. Using a PAT causes the tag push to trigger the
          # Pipeline workflow normally.
          # Create a classic PAT with `repo` scope (or a fine-grained PAT with
          # Contents: Read & Write + Workflows: Read & Write) and add it as a
          # repository secret named RELEASE_PLEASE_TOKEN.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
