name: SDK Performance Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          packages=()
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              packages+=("-e" "$package")
            fi
          done
          if [ ${#packages[@]} -gt 0 ]; then
            python -m pip install "${packages[@]}"
          fi
          python -m pip install -e ".[dev,docs]" 

      - name: Run Performance Suite
        env:
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          # Run twice: first to establish baseline (if none exists), second to compare.
          # In a real setup, baseline would be downloaded from previous artifacts.
          python scripts/performance_suite.py
          
      - name: Save Baseline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-cache
          path: performance_cache.json
          if-no-files-found: ignore
