name: SDK Performance Suite

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '**/*.md'

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          packages=()
          for package in packages/*; do
            if [ -f "$package/pyproject.toml" ]; then
              packages+=("-e" "$package")
            fi
          done
          packages+=("-e" ".[dev,docs]")
          python -m pip install "${packages[@]}" 

      - name: Run Performance Suite
        env:
          IMEDNET_POSTMAN_PATH: ${{ github.workspace }}/imednet.postman_collection.json
        run: |
          pytest tests/core/test_performance.py -m performance -v
          
      - name: Save Verification Artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance_report.json
          if-no-files-found: ignore
