name: Documentation improvement
description: Report missing, unclear, or outdated documentation
title: "docs(<area>): "
body:
  - type: markdown
    attributes:
      value: |
        Use a normalized title such as `docs(contributing): clarify issue triage workflow`.
        Documentation issues should identify the current gap and the desired learning outcome.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - docs
        - contributing
        - cli
        - core
        - workflows-plugin
        - airflow-provider
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: API surface impact
      options:
        - internal only
        - public SDK
        - CLI
        - docs-only
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      placeholder: What is missing, outdated, or confusing?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Current location
      placeholder: Link or name the page, section, command help, or file if it already exists.
    validations:
      required: false
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      placeholder: What should a reader be able to understand or do after the docs update?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example or snippet impact
      placeholder: Which examples, tutorials, or command help should be added or updated?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification requirements
      value: |
        - hatch run docs
        - review rendered output for the affected pages
    validations:
      required: true
