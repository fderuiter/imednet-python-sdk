name: Refactor proposal
description: Propose internal code quality, maintainability, or architecture work
title: "refactor(<area>): "
body:
  - type: markdown
    attributes:
      value: |
        Use a normalized title such as `refactor(core): remove dynamic kwargs parsing`.
        Refactors should explain the current pain and the expected maintainability gain.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - models
        - http
        - auth
        - pagination
        - cli
        - docs
        - tests
        - ci
        - release
        - workflows-plugin
        - airflow-provider
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - core
        - plugins-workflows
        - providers-airflow
        - docs
        - ci
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: API surface impact
      options:
        - internal only
        - public SDK
        - CLI
        - docs-only
    validations:
      required: true
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - patch
        - minor
        - major
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current problem
      placeholder: What maintainability, complexity, or architecture issue exists today?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      placeholder: Describe the intended refactor outcome and boundaries.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      placeholder: What behavior must remain stable? What should this issue not attempt?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test impact
      placeholder: What tests need to be added or updated?
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Docs impact
      placeholder: Which docs, examples, or help text need updates? Write "none" if not applicable.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification requirements
      value: |
        - black --check
        - isort --check --profile black
        - ruff check
        - mypy (affected packages)
        - pytest with coverage >= 90%
        - make docs when docs or public API surface is affected
    validations:
      required: true
